<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Context migration — resuming an AI session with full project context</title>
<desc>Flow showing how Syncbridge migrates context so an AI can resume a coding session exactly where it left off.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<text class="th" x="340" y="32" text-anchor="middle">Context migration</text>
<g class="c-gray">
<rect x="50" y="50" width="580" height="116" rx="12" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="70" y="72" dominant-baseline="central">Sources</text>
</g>
<g class="node c-purple">
<rect x="70" y="84" width="160" height="68" rx="8" stroke-width="0.5"/>
<text class="th" x="150" y="112" text-anchor="middle" dominant-baseline="central">claude-state.md</text>
<text class="ts" x="150" y="132" text-anchor="middle" dominant-baseline="central">CLI actions + last 10</text>
</g>
<g class="node c-teal">
<rect x="260" y="84" width="160" height="68" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="112" text-anchor="middle" dominant-baseline="central">claude-ai.md</text>
<text class="ts" x="340" y="132" text-anchor="middle" dominant-baseline="central">Last AI response</text>
</g>
<g class="node c-blue">
<rect x="450" y="84" width="160" height="68" rx="8" stroke-width="0.5"/>
<text class="th" x="530" y="112" text-anchor="middle" dominant-baseline="central">Conventions</text>
<text class="ts" x="530" y="132" text-anchor="middle" dominant-baseline="central">Stack, rules, shortcuts</text>
</g>
<line x1="150" y1="152" x2="300" y2="196" stroke="var(--t)" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="152" x2="340" y2="196" stroke="var(--t)" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="530" y1="152" x2="380" y2="196" stroke="var(--t)" stroke-width="1" marker-end="url(#arrow)"/>
<g class="node c-amber">
<rect x="190" y="198" width="300" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="222" text-anchor="middle" dominant-baseline="central">Regenerate context.md in panel</text>
<text class="ts" x="340" y="242" text-anchor="middle" dominant-baseline="central">Merges all sources into one file</text>
</g>
<line x1="340" y1="254" x2="340" y2="274" stroke="var(--t)" stroke-width="1" marker-end="url(#arrow)"/>
<g class="node c-teal">
<rect x="190" y="276" width="300" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="300" text-anchor="middle" dominant-baseline="central">Copy claude-context.md</text>
<text class="ts" x="340" y="320" text-anchor="middle" dominant-baseline="central">One file — complete session context</text>
</g>
<line x1="340" y1="332" x2="340" y2="352" stroke="var(--t)" stroke-width="1" marker-end="url(#arrow)"/>
<g class="node c-purple">
<rect x="190" y="354" width="300" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="378" text-anchor="middle" dominant-baseline="central">Open new AI chat — Alt+V to inject</text>
<text class="ts" x="340" y="398" text-anchor="middle" dominant-baseline="central">Paste context into fresh conversation</text>
</g>
<line x1="340" y1="410" x2="340" y2="430" stroke="var(--t)" stroke-width="1" marker-end="url(#arrow)"/>
<g class="node c-green">
<rect x="190" y="432" width="300" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="456" text-anchor="middle" dominant-baseline="central">AI resumes with full context</text>
<text class="ts" x="340" y="476" text-anchor="middle" dominant-baseline="central">No re-explaining — picks up exactly where you left off</text>
</g>
<text class="ts" x="340" y="540" text-anchor="middle">Works across Claude.ai, ChatGPT, Gemini, and any AI chat</text>
</svg>
