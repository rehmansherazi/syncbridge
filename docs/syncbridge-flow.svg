<svg width="100%" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Syncbridge complete flow — 13 steps</title>
<desc>13 sequential steps showing how to use Syncbridge from opening VS Code to AI resuming with full context.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect x="40" y="20" width="600" height="52" rx="8" fill="#f1efe8" stroke="#888"/>
<text x="100" y="50" font-family="sans-serif" font-size="13" font-weight="500">1</text>
<text x="130" y="50" font-family="sans-serif" font-size="12">Open VS Code</text>
<line x1="340" y1="72" x2="340" y2="88" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="90" width="600" height="52" rx="8" fill="#e6f1fb" stroke="#378add"/>
<text x="100" y="120" font-family="sans-serif" font-size="13" font-weight="500">2</text>
<text x="130" y="120" font-family="sans-serif" font-size="12">Set active project to jobmatch — Ctrl+Shift+A (VS Code window)</text>
<line x1="340" y1="142" x2="340" y2="158" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="160" width="600" height="52" rx="8" fill="#eeedfe" stroke="#7f77dd"/>
<text x="100" y="190" font-family="sans-serif" font-size="13" font-weight="500">3</text>
<text x="130" y="190" font-family="sans-serif" font-size="12">Open jobmatch Claude.ai Project in Chrome</text>
<line x1="340" y1="212" x2="340" y2="228" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="230" width="600" height="52" rx="8" fill="#eeedfe" stroke="#7f77dd"/>
<text x="100" y="260" font-family="sans-serif" font-size="13" font-weight="500">4</text>
<text x="130" y="260" font-family="sans-serif" font-size="12">Ask Claude something about jobmatch</text>
<line x1="340" y1="282" x2="340" y2="298" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="300" width="600" height="52" rx="8" fill="#e1f5ee" stroke="#1d9e75"/>
<text x="100" y="330" font-family="sans-serif" font-size="13" font-weight="500">5</text>
<text x="130" y="330" font-family="sans-serif" font-size="12">Chrome bot auto-copies response — watch for ✓ Auto-copied response in bot</text>
<line x1="340" y1="352" x2="340" y2="368" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="370" width="600" height="52" rx="8" fill="#e6f1fb" stroke="#378add"/>
<text x="100" y="400" font-family="sans-serif" font-size="13" font-weight="500">6</text>
<text x="130" y="400" font-family="sans-serif" font-size="12">Press Ctrl+Shift+X (VS Code window) — writes to jobmatch/claude-ai.md</text>
<line x1="340" y1="422" x2="340" y2="438" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="440" width="600" height="52" rx="8" fill="#eeedfe" stroke="#7f77dd"/>
<text x="100" y="470" font-family="sans-serif" font-size="13" font-weight="500">7</text>
<text x="130" y="470" font-family="sans-serif" font-size="12">In Claude Code CLI terminal (jobmatch directory) — type /sync</text>
<line x1="340" y1="492" x2="340" y2="508" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="510" width="600" height="52" rx="8" fill="#faeeda" stroke="#ef9f27"/>
<text x="100" y="540" font-family="sans-serif" font-size="13" font-weight="500">8</text>
<text x="130" y="540" font-family="sans-serif" font-size="12">Watch claude-state.md update automatically via PostToolUse hook</text>
<line x1="340" y1="562" x2="340" y2="578" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="580" width="600" height="52" rx="8" fill="#e6f1fb" stroke="#378add"/>
<text x="100" y="610" font-family="sans-serif" font-size="13" font-weight="500">9</text>
<text x="130" y="610" font-family="sans-serif" font-size="12">Open Syncbridge panel Ctrl+Shift+S (VS Code window) — verify files have real content</text>
<line x1="340" y1="632" x2="340" y2="648" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="650" width="600" height="52" rx="8" fill="#e1f5ee" stroke="#1d9e75"/>
<text x="100" y="680" font-family="sans-serif" font-size="13" font-weight="500">10</text>
<text x="130" y="680" font-family="sans-serif" font-size="12">Click ⟳ Regenerate context.md in Syncbridge panel</text>
<line x1="340" y1="702" x2="340" y2="718" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="720" width="600" height="52" rx="8" fill="#e1f5ee" stroke="#1d9e75"/>
<text x="100" y="750" font-family="sans-serif" font-size="13" font-weight="500">11</text>
<text x="130" y="750" font-family="sans-serif" font-size="12">Click Copy next to claude-context.md in panel</text>
<line x1="340" y1="772" x2="340" y2="788" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="790" width="600" height="52" rx="8" fill="#eeedfe" stroke="#7f77dd"/>
<text x="100" y="820" font-family="sans-serif" font-size="13" font-weight="500">12</text>
<text x="130" y="820" font-family="sans-serif" font-size="12">Open new claude.ai chat — press Alt+V (Chrome browser) to inject</text>
<line x1="340" y1="842" x2="340" y2="858" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="860" width="600" height="52" rx="8" fill="#eaf3de" stroke="#639922"/>
<text x="100" y="890" font-family="sans-serif" font-size="13" font-weight="500">13</text>
<text x="130" y="890" font-family="sans-serif" font-size="12">Press Enter — AI resumes with full context</text>
</svg>
